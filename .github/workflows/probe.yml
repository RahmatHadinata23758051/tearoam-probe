name: probe
on:
  workflow_dispatch:
permissions:
  issues: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Start listener
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          IP=$(curl -s https://api.ipify.org)
          DOMAIN=$(echo "$IP" | tr . -).nip.io
          gh issue comment 1 -R ${{ github.repository }} --body "IP=$IP DOMAIN=$DOMAIN"
          python3 - <<'PYS' &
          import socket
          s = socket.socket()
          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          s.bind(("0.0.0.0", 2083))
          s.listen(5)
          print("LISTENING", flush=True)
          conn, addr = s.accept()
          print("CONN", addr, flush=True)
          print(conn.recv(64).hex(), flush=True)
          PYS
          sleep 600
